<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LIMINAL</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#050508;width:100vw;height:100vh;overflow:hidden;font-family:'Courier New',monospace;}
  #splash{position:fixed;inset:0;background:#050508;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#22223a;}
  #splash h1{font-size:clamp(20px,5vw,36px);letter-spacing:.25em;text-transform:uppercase;margin-bottom:6px;color:#22223a;}
  #splash p{font-size:9px;letter-spacing:.6em;text-transform:uppercase;color:#0d0d1c;margin-bottom:64px;}
  #splash button{background:none;border:1px solid #1a1a32;color:#22223a;padding:11px 44px;cursor:pointer;font-size:8px;letter-spacing:.5em;text-transform:uppercase;font-family:inherit;transition:border-color .2s,color .2s;}
  #splash button:hover{border-color:#3a3a6a;color:#5a5a9a;}
  #splash .hint{margin-top:48px;font-size:8px;color:#0d0d1c;letter-spacing:.3em;line-height:2.4;text-transform:uppercase;text-align:center;}
  #wrap{position:relative;width:100%;height:100%;display:none;}
  #gc{width:100%;height:100%;display:block;image-rendering:pixelated;cursor:crosshair;}
  #ov{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;image-rendering:pixelated;}
  #hud{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:#13131e;font-size:8px;letter-spacing:.5em;text-transform:uppercase;pointer-events:none;}
  #info{position:absolute;top:10px;left:12px;color:#1a1a2a;font-size:7px;letter-spacing:.3em;text-transform:uppercase;pointer-events:none;line-height:1.8;}
  #dpad{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:none;gap:4px;grid-template:'  u  ' '. l r' '  d  ';width:140px;}
  .dkey{background:rgba(12,12,24,.85);border:1px solid #1a1a32;color:#252540;width:44px;height:44px;font-size:18px;cursor:pointer;border-radius:3px;touch-action:none;user-select:none;display:flex;align-items:center;justify-content:center;}

  /* Options menu */
  #optBtn{position:absolute;top:12px;right:14px;background:none;border:1px solid #1a1a2a;color:#1a1a2a;font-size:7px;letter-spacing:.4em;text-transform:uppercase;font-family:inherit;padding:5px 10px;cursor:pointer;z-index:5;transition:border-color .2s,color .2s;}
  #optBtn:hover{border-color:#3a3a6a;color:#3a3a6a;}
  #optPanel{position:absolute;top:0;right:0;width:260px;height:100%;background:rgba(5,5,8,.97);border-left:1px solid #1a1a2a;display:none;flex-direction:column;padding:32px 28px;z-index:20;gap:0;}
  #optPanel.open{display:flex;}
  #optPanel h2{font-size:9px;letter-spacing:.5em;text-transform:uppercase;color:#22223a;margin-bottom:36px;margin-top:8px;}
  .opt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;border-bottom:1px solid #111120;padding-bottom:20px;}
  .opt-row:last-of-type{border-bottom:none;}
  .opt-label{font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:#1e1e32;}
  .opt-val{font-size:8px;letter-spacing:.3em;color:#2a2a44;min-width:60px;text-align:right;}
  .opt-toggle{background:none;border:1px solid #1a1a2a;color:#1e1e32;font-size:7px;letter-spacing:.35em;text-transform:uppercase;font-family:inherit;padding:4px 10px;cursor:pointer;transition:border-color .15s,color .15s;}
  .opt-toggle:hover{border-color:#3a3a6a;color:#4a4a80;}
  .opt-toggle.on{border-color:#2a2a4a;color:#3a3a6a;}
  input[type=range]{-webkit-appearance:none;width:100px;height:2px;background:#1a1a2a;outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:#2a2a4a;border-radius:50%;}
  .opt-section{font-size:7px;letter-spacing:.5em;text-transform:uppercase;color:#111120;margin-bottom:18px;margin-top:8px;}
  #optClose{margin-top:auto;background:none;border:1px solid #1a1a2a;color:#1a1a2a;font-size:7px;letter-spacing:.4em;text-transform:uppercase;font-family:inherit;padding:8px;cursor:pointer;width:100%;transition:border-color .2s,color .2s;}
  #optClose:hover{border-color:#3a3a6a;color:#3a3a6a;}
  #saveMsg{font-size:7px;letter-spacing:.3em;color:#1a2a1a;text-transform:uppercase;text-align:center;margin-bottom:10px;min-height:14px;transition:opacity .5s;}
</style>
</head>
<body>

<div id="splash">
  <div style="font-size:9px;letter-spacing:.45em;color:#171726;margin-bottom:48px">████ ████ ████</div>
  <h1>LIMINAL</h1>
  <p>you exist. that is enough.</p>
  <button id="enterBtn">enter</button>
  <div class="hint">
    WASD — move &nbsp;|&nbsp; SHIFT — sprint<br>
    SPACE — jump &nbsp;|&nbsp; MOUSE — look<br>
    E — open / close door &nbsp;|&nbsp; CLICK — lock cursor
  </div>
</div>

<div id="wrap">
  <canvas id="gc"></canvas>
  <canvas id="ov" width="320" height="240"></canvas>
  <div id="hud">you are here</div>
  <div id="info"></div>
  <!-- Options button -->
  <button id="optBtn">options</button>

  <!-- Options panel -->
  <div id="optPanel">
    <h2>options</h2>

    <div class="opt-section">audio</div>
    <div class="opt-row">
      <span class="opt-label">master</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="range" id="volSlider" min="0" max="100" value="70">
        <span class="opt-val" id="volVal">70</span>
      </div>
    </div>
    <div class="opt-row">
      <span class="opt-label">ambient</span>
      <button class="opt-toggle on" id="ambToggle">on</button>
    </div>
    <div class="opt-row">
      <span class="opt-label">footsteps</span>
      <button class="opt-toggle on" id="stepToggle">on</button>
    </div>

    <div class="opt-section" style="margin-top:8px;">display</div>
    <div class="opt-row">
      <span class="opt-label">scanlines</span>
      <button class="opt-toggle on" id="scanToggle">on</button>
    </div>
    <div class="opt-row">
      <span class="opt-label">film grain</span>
      <button class="opt-toggle on" id="grainToggle">on</button>
    </div>
    <div class="opt-row">
      <span class="opt-label">vignette</span>
      <button class="opt-toggle on" id="vigToggle">on</button>
    </div>

    <div class="opt-section" style="margin-top:8px;">save</div>
    <div class="opt-row">
      <span class="opt-label">position</span>
      <div style="display:flex;gap:8px;">
        <button class="opt-toggle" id="saveBtn">save</button>
        <button class="opt-toggle" id="loadBtn">load</button>
        <button class="opt-toggle" id="clearBtn">clear</button>
      </div>
    </div>
    <div class="opt-row" style="border-bottom:none;padding-bottom:0;margin-bottom:0;">
      <span class="opt-label">saved at</span>
      <span class="opt-val" id="savedPos">—</span>
    </div>

    <div id="saveMsg"></div>
    <button id="optClose">resume</button>
  </div>

  <div id="dpad">
    <button class="dkey" style="grid-area:u" data-key="KeyW">▲</button>
    <button class="dkey" style="grid-area:l" data-key="KeyA">◀</button>
    <button class="dkey" style="grid-area:r" data-key="KeyD">▶</button>
    <button class="dkey" style="grid-area:d" data-key="KeyS">▼</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── OPTIONS + SAVE STATE ─────────────────────────────────────────────────────
var opts = {
  vol:      70,
  ambient:  true,
  footsteps:true,
  scanlines:true,
  grain:    true,
  vignette: true
};

// Load saved options
try {
  var so = localStorage.getItem('liminal_opts');
  if (so) opts = Object.assign(opts, JSON.parse(so));
} catch(e){}

function saveOpts() {
  try { localStorage.setItem('liminal_opts', JSON.stringify(opts)); } catch(e){}
}

function applyOpts() {
  if (masterGain) masterGain.gain.value = opts.vol / 100;
  // ambient is just master vol — if ambient off, mute both buses
  if (outBus && inBus) {
    var ambMul = opts.ambient ? 1 : 0;
    // re-apply inside crossfade on top of ambient toggle
    outBus.gain.value = isInside ? 0.12 * ambMul : 1 * ambMul;
    inBus.gain.value  = isInside ? 1   * ambMul : 0 * ambMul;
  }
  // sync UI
  document.getElementById('volSlider').value = opts.vol;
  document.getElementById('volVal').textContent = opts.vol;
  setToggle('ambToggle',  opts.ambient);
  setToggle('stepToggle', opts.footsteps);
  setToggle('scanToggle', opts.scanlines);
  setToggle('grainToggle',opts.grain);
  setToggle('vigToggle',  opts.vignette);
  updateSavedDisplay();
}

function setToggle(id, on) {
  var el = document.getElementById(id);
  el.textContent = on ? 'on' : 'off';
  el.classList.toggle('on', on);
}

function updateSavedDisplay() {
  try {
    var s = localStorage.getItem('liminal_save');
    if (s) {
      var d = JSON.parse(s);
      document.getElementById('savedPos').textContent =
        d.x.toFixed(0)+', '+d.z.toFixed(0);
    } else {
      document.getElementById('savedPos').textContent = '—';
    }
  } catch(e){ document.getElementById('savedPos').textContent = '—'; }
}

function showSaveMsg(msg) {
  var el = document.getElementById('saveMsg');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(function(){ el.style.opacity='0'; }, 1800);
}

// Options panel toggle
var optOpen = false;
var gameYaw = 0, gamePitch = 0; // reference updated by game loop
var getGameCamera = null; // set by startGame

document.getElementById('optBtn').addEventListener('click', function() {
  optOpen = !optOpen;
  document.getElementById('optPanel').classList.toggle('open', optOpen);
  applyOpts();
  if (optOpen) {
    // exit pointer lock so mouse can interact with panel
    if (document.exitPointerLock) document.exitPointerLock();
  }
});
document.getElementById('optClose').addEventListener('click', function() {
  optOpen = false;
  document.getElementById('optPanel').classList.remove('open');
});

// Volume slider
document.getElementById('volSlider').addEventListener('input', function() {
  opts.vol = parseInt(this.value);
  document.getElementById('volVal').textContent = opts.vol;
  if (masterGain) masterGain.gain.value = opts.vol / 100;
  saveOpts();
});

// Toggle buttons
function bindToggle(id, key) {
  document.getElementById(id).addEventListener('click', function() {
    opts[key] = !opts[key];
    setToggle(id, opts[key]);
    applyOpts();
    saveOpts();
  });
}
bindToggle('ambToggle',  'ambient');
bindToggle('stepToggle', 'footsteps');
bindToggle('scanToggle', 'scanlines');
bindToggle('grainToggle','grain');
bindToggle('vigToggle',  'vignette');

// Save / load / clear
document.getElementById('saveBtn').addEventListener('click', function() {
  if (!getGameCamera) return;
  var cam = getGameCamera();
  try {
    localStorage.setItem('liminal_save', JSON.stringify({
      x: cam.x, y: cam.y, z: cam.z,
      yaw: cam.yaw, pitch: cam.pitch
    }));
    showSaveMsg('position saved');
    updateSavedDisplay();
  } catch(e){ showSaveMsg('save failed'); }
});
document.getElementById('loadBtn').addEventListener('click', function() {
  if (!getGameCamera) return;
  try {
    var s = localStorage.getItem('liminal_save');
    if (!s) { showSaveMsg('nothing saved'); return; }
    var d = JSON.parse(s);
    getGameCamera(d); // pass data = load mode
    showSaveMsg('position loaded');
    optOpen = false;
    document.getElementById('optPanel').classList.remove('open');
  } catch(e){ showSaveMsg('load failed'); }
});
document.getElementById('clearBtn').addEventListener('click', function() {
  try { localStorage.removeItem('liminal_save'); showSaveMsg('save cleared'); updateSavedDisplay(); } catch(e){}
});

// Escape key closes panel
window.addEventListener('keydown', function(e) {
  if (e.code === 'Escape' || e.code === 'KeyP') {
    optOpen = !optOpen;
    document.getElementById('optPanel').classList.toggle('open', optOpen);
    if (optOpen) { applyOpts(); if (document.exitPointerLock) document.exitPointerLock(); }
  }
});


document.getElementById('enterBtn').addEventListener('click', function() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('wrap').style.display = 'block';
  if ('ontouchstart' in window) {
    document.getElementById('dpad').style.display = 'grid';
  }
  if (typeof THREE === 'undefined') {
    document.getElementById('hud').textContent = 'loading three.js...';
    var check = setInterval(function() {
      if (typeof THREE !== 'undefined') { clearInterval(check); startGame(); }
    }, 100);
  } else {
    startGame();
  }
});

// ─── AUDIO ───────────────────────────────────────────────────────────────────
var AC, masterGain, reverb, outBus, inBus, audioReady = false, isInside = false;
var lastStep = 0, breathTimer = 0;

function initAudio() {
  if (audioReady) return;
  audioReady = true;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = AC.createGain(); masterGain.gain.value = 0.7; masterGain.connect(AC.destination);

  // Reverb IR
  reverb = AC.createConvolver();
  var irLen = Math.floor(AC.sampleRate * 2.6);
  var irBuf = AC.createBuffer(2, irLen, AC.sampleRate);
  for (var c = 0; c < 2; c++) {
    var ch = irBuf.getChannelData(c);
    for (var i = 0; i < irLen; i++) ch[i] = (Math.random()*2-1) * Math.pow(1 - i/irLen, 2.2);
  }
  reverb.buffer = irBuf; reverb.connect(masterGain);

  outBus = AC.createGain(); outBus.gain.value = 1; outBus.connect(masterGain);
  inBus  = AC.createGain(); inBus.gain.value  = 0; inBus.connect(reverb); inBus.connect(masterGain);

  // Outdoor drones
  drone(38,  0.16, outBus); drone(41, 0.09, outBus);
  drone(60,  0.04, outBus); drone(120,0.025,outBus);
  noiseBand(1100, 1.0, 0.032, outBus);
  noiseBand(3500, 3.5, 0.012, outBus);
  // Indoor
  drone(55,  0.13, inBus);  drone(110,0.06, inBus);
  noiseBand(380,  1.8, 0.05, inBus);
  noiseBand(3800, 8.0, 0.04, inBus);

  scheduleSwell();
}

function drone(freq, vol, dest) {
  var o = AC.createOscillator(), g = AC.createGain();
  var lfo = AC.createOscillator(), lg = AC.createGain();
  lfo.frequency.value = 0.05 + Math.random()*0.07; lg.gain.value = freq * 0.003;
  lfo.connect(lg); lg.connect(o.frequency); lfo.start();
  o.type = 'sine'; o.frequency.value = freq; g.gain.value = vol;
  o.connect(g); g.connect(dest); o.start();
}

function noiseBand(freq, q, vol, dest) {
  var len = AC.sampleRate * 2, buf = AC.createBuffer(1, len, AC.sampleRate);
  var d = buf.getChannelData(0); for (var i=0;i<len;i++) d[i]=Math.random()*2-1;
  var src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  var bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=q;
  var g = AC.createGain(); g.gain.value = vol;
  src.connect(bp); bp.connect(g); g.connect(dest); src.start();
}

function scheduleSwell() {
  function sw() {
    if (!AC) return;
    var f = [220,277,330,370,415,494][Math.floor(Math.random()*6)];
    var o=AC.createOscillator(), g=AC.createGain(), now=AC.currentTime, dur=5+Math.random()*8;
    o.frequency.value=f; o.type='sine';
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.05,now+dur*.35); g.gain.linearRampToValueAtTime(0,now+dur);
    o.connect(g); g.connect(masterGain); o.start(now); o.stop(now+dur+.1);
    setTimeout(sw, 10000+Math.random()*20000);
  }
  setTimeout(sw, 5000+Math.random()*8000);
}

function setInsideAudio(inside) {
  if (!AC || inside === isInside) return;
  isInside = inside;
  var now = AC.currentTime, t = 1.2;
  inBus.gain.linearRampToValueAtTime(inside ? 1 : 0, now+t);
  outBus.gain.linearRampToValueAtTime(inside ? 0.12 : 1, now+t);
}

function playFootstep(surface, sprinting) {
  if (!AC) return;
  var now = AC.currentTime, interval = sprinting ? 0.25 : 0.42;
  if (now - lastStep < interval) return;
  lastStep = now;
  var bus = isInside ? inBus : outBus;

  if (surface === 'tile') {
    var o=AC.createOscillator(),g=AC.createGain();
    o.frequency.setValueAtTime(300,now); o.frequency.exponentialRampToValueAtTime(70,now+.07);
    g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.001,now+.1);
    o.connect(g); g.connect(bus); o.start(now); o.stop(now+.11);
    var e=AC.createOscillator(),eg=AC.createGain();
    e.frequency.setValueAtTime(250,now+.06); e.frequency.exponentialRampToValueAtTime(50,now+.14);
    eg.gain.setValueAtTime(0.08,now+.06); eg.gain.exponentialRampToValueAtTime(0.001,now+.18);
    e.connect(eg); eg.connect(reverb); e.start(now+.06); e.stop(now+.19);
  } else if (surface === 'metal') {
    var o=AC.createOscillator(),lp=AC.createBiquadFilter(),g=AC.createGain();
    o.type='square'; o.frequency.setValueAtTime(560,now); o.frequency.exponentialRampToValueAtTime(180,now+.12);
    lp.type='lowpass'; lp.frequency.value=2000;
    g.gain.setValueAtTime(0.22,now); g.gain.exponentialRampToValueAtTime(0.001,now+.18);
    o.connect(lp); lp.connect(g); g.connect(bus); o.start(now); o.stop(now+.19);
    var r=AC.createOscillator(),rg=AC.createGain();
    r.frequency.value=1200; rg.gain.setValueAtTime(0.06,now); rg.gain.exponentialRampToValueAtTime(0.001,now+.65);
    r.connect(rg); rg.connect(reverb); r.start(now); r.stop(now+.66);
  } else { // concrete
    var o=AC.createOscillator(),g=AC.createGain();
    o.frequency.setValueAtTime(165,now); o.frequency.exponentialRampToValueAtTime(36,now+.09);
    g.gain.setValueAtTime(0.4,now); g.gain.exponentialRampToValueAtTime(0.001,now+.13);
    o.connect(g); g.connect(bus); o.start(now); o.stop(now+.14);
    var c=AC.createOscillator(),cg=AC.createGain();
    c.frequency.value=1800; cg.gain.setValueAtTime(0.1,now); cg.gain.exponentialRampToValueAtTime(0.001,now+.04);
    c.connect(cg); cg.connect(bus); c.start(now); c.stop(now+.05);
  }
}

function playJump() {
  if (!AC) return; var now=AC.currentTime;
  var o=AC.createOscillator(),g=AC.createGain();
  o.frequency.setValueAtTime(110,now); o.frequency.exponentialRampToValueAtTime(50,now+.1);
  g.gain.setValueAtTime(0.25,now); g.gain.exponentialRampToValueAtTime(0.001,now+.14);
  o.connect(g); g.connect(masterGain); o.start(now); o.stop(now+.15);
}

function playLand(vel) {
  if (!AC) return; var hard=vel<-7, now=AC.currentTime;
  var o=AC.createOscillator(),g=AC.createGain();
  o.frequency.setValueAtTime(hard?110:85,now); o.frequency.exponentialRampToValueAtTime(26,now+.17);
  g.gain.setValueAtTime(hard?.65:.4,now); g.gain.exponentialRampToValueAtTime(0.001,now+.2);
  o.connect(g); g.connect(masterGain); o.start(now); o.stop(now+.21);
  if (isInside) {
    var r=AC.createOscillator(),rg=AC.createGain();
    r.frequency.setValueAtTime(180,now+.02); r.frequency.exponentialRampToValueAtTime(45,now+.22);
    rg.gain.setValueAtTime(0.18,now+.02); rg.gain.exponentialRampToValueAtTime(0.001,now+.28);
    r.connect(rg); rg.connect(reverb); r.start(now+.02); r.stop(now+.29);
  }
}

function doBreath(dt, sprinting, onGround) {
  if (!AC) return;
  if (sprinting && onGround) {
    breathTimer += dt;
    if (breathTimer > 0.9) {
      breathTimer = 0;
      var now=AC.currentTime, len=Math.floor(AC.sampleRate*.15);
      var buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
      for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.sin(Math.PI*i/len);
      var src=AC.createBufferSource(); src.buffer=buf;
      var bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=850; bp.Q.value=2;
      var g=AC.createGain(); g.gain.value=0.06;
      src.connect(bp); bp.connect(g); g.connect(masterGain); src.start(now);
    }
  } else { breathTimer = 0; }
}

// ─── WORLD ───────────────────────────────────────────────────────────────────
var solids = [];   // {minX,maxX,minZ,maxZ}
var zones  = [];   // {minX,maxX,minZ,maxZ,floorY,ceilY,surface}

function addSolid(cx,cz,hw,hd) { solids.push({minX:cx-hw,maxX:cx+hw,minZ:cz-hd,maxZ:cz+hd}); }
function addZone(cx,cz,hw,hd,fy,cy,surf) { zones.push({minX:cx-hw,maxX:cx+hw,minZ:cz-hd,maxZ:cz+hd,floorY:fy,ceilY:cy,surface:surf}); }
function getZone(x,z) {
  for (var i=0;i<zones.length;i++) {
    var z2=zones[i];
    if(x>z2.minX&&x<z2.maxX&&z>z2.minZ&&z<z2.maxZ) return z2;
  }
  return null;
}

// Seeded RNG
var _seed = 42;
function srng(s) { _seed=s; }
function rnd() { _seed=(_seed*1664525+1013904223)&0xffffffff; return (_seed>>>0)/0xffffffff; }
function rr(a,b) { return a+rnd()*(b-a); }
function ri(a,b) { return Math.floor(a+rnd()*(b-a+1)); }

var M; // materials — set in startGame

function buildWorld(scene) {
  // Ground
  var g=new THREE.Mesh(new THREE.PlaneGeometry(600,600),M.ground);
  g.rotation.x=-Math.PI/2; scene.add(g);

  // ── GROUND SURFACE DETAIL ──
  var matRoad    = new THREE.MeshLambertMaterial({color:0x252528}); // asphalt
  var matRoadLine= new THREE.MeshLambertMaterial({color:0x1c1c1a}); // barely visible
  var matGrass   = new THREE.MeshLambertMaterial({color:0x181c10}); // dead grass
  var matDirt    = new THREE.MeshLambertMaterial({color:0x1c1810}); // dirt
  var matConc    = new THREE.MeshLambertMaterial({color:0x2a2a32}); // pavement slab

  var BLOCK=18, R=4; // match world gen

      dash2.position.set(dx, 0.005, rz); scene.add(dash2);

  // Pavement / sidewalk strips along building edges
  var sidewalkW = 2.2;
  var concH = 0.055;
  for(var bx2=-R; bx2<=R; bx2++) for(var bz2=-R; bz2<=R; bz2++) {

    var sw=new THREE.Mesh(new THREE.BoxGeometry(BLOCK-roadW-0.5, concH, BLOCK-roadW-0.5), matConc);
    sw.position.set(wx2, concH/2, wz2); scene.add(sw);
    // Cracks — thin dark lines across the slab

  // Grass/dirt patches in gaps between buildings — seeded

  for(var bz3=-R-1;bz3<=R+1;bz3++){

      kb2.position.set(0, kerbH/2, kz+side*(roadW/2+kerbW/2)); scene.add(kb2);

  var BLOCK=18, R=4;

function makeBuilding(scene,wx,wz) {
  var grp=new THREE.Group();
  var type=ri(0,4);
  var mat=[M.brut1,M.brut2,M.brut3][ri(0,2)];
  var bw=6,bd=6;

  if(type===0) { // slab
    bw=rr(5,11); bd=rr(5,11); var bh=rr(10,36);
    var m=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),mat); m.position.y=bh/2; grp.add(m);
    for(var i=0;i<Math.floor(bh/3);i++){var b=new THREE.Mesh(new THREE.BoxGeometry(bw+.3,.18,bd+.3),M.brut2);b.position.y=i*3+1;grp.add(b);}
    addWins(grp,bw,bh,bd,0,0,0,mat);
  } else if(type===1) { // ziggurat
    bw=rr(7,14); bd=rr(7,14); var cw=bw,cd=bd,cy=0,levels=ri(3,5);
    for(var i=0;i<levels;i++){var lh=rr(3,6);var m=new THREE.Mesh(new THREE.BoxGeometry(cw,lh,cd),mat);m.position.y=cy+lh/2;grp.add(m);addWins(grp,cw,lh,cd,cy,0,0,mat);cy+=lh;cw-=rr(.8,1.5);cd-=rr(.8,1.5);}
    bw=rr(7,14); bd=rr(7,14);
  } else if(type===2) { // tower cluster
    bw=8;bd=8;var cnt=ri(2,3),pox=0;
    for(var i=0;i<cnt;i++){var tw=rr(2.5,5),th=rr(8,28),td=rr(2.5,5),ox=rr(-3.5,3.5),oz2=rr(-3.5,3.5);var m=new THREE.Mesh(new THREE.BoxGeometry(tw,th,td),mat);m.position.set(ox,th/2,oz2);grp.add(m);addWins(grp,tw,th,td,0,ox,oz2,mat);addSolid(wx+ox,wz+oz2,tw/2,td/2);if(i>0){var br=new THREE.Mesh(new THREE.BoxGeometry(Math.abs(ox-pox)+1,.7,1),M.brut2);br.position.set((ox+pox)/2,rr(th*.3,th*.7),oz2);grp.add(br);}pox=ox;}
  } else if(type===3) { // recessed panel
    bw=rr(6,13);bd=rr(6,13);var bh=rr(12,28);
    var m=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),mat);m.position.y=bh/2;grp.add(m);
    for(var i=0;i<ri(2,5);i++){var rp=new THREE.Mesh(new THREE.BoxGeometry(rr(1,3),rr(2,5),.4),M.brut2);rp.position.set(rr(-bw/2+1,bw/2-1),rr(1,bh-1),bd/2+.01);grp.add(rp);}
    addWins(grp,bw,bh,bd,0,0,0,mat);
  } else { // low slab
    bw=rr(7,20);bd=rr(7,20);var bh=rr(3.5,8);
    var m=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),mat);m.position.y=bh/2;grp.add(m);
    var rf=new THREE.Mesh(new THREE.BoxGeometry(bw+2,.5,bd+2),M.brut2);rf.position.y=bh+.25;grp.add(rf);
    addWins(grp,bw,bh,bd,0,0,0,mat);
  }

  grp.position.set(wx,0,wz); scene.add(grp);
  if(type!==2) {
    var _DW=1.4, _hw=bw/2, _hd=bd/2;
    addSolid(wx, wz-_hd+0.15, _hw, 0.15);
    addSolid(wx+_hw-0.15, wz, 0.15, _hd);
    addSolid(wx-_hw+0.15, wz, 0.15, _hd);
    var _seg=_hw-_DW/2;
    if(_seg>0.05){
      addSolid(wx-_DW/2-_seg/2, wz+_hd-0.15, _seg, 0.15);
      addSolid(wx+_DW/2+_seg/2, wz+_hd-0.15, _seg, 0.15);
    }
  }
  return {bw:bw,bd:bd};
}

function addWins(grp,w,h,d,baseY,ox,oz,mat) {
  var floors=Math.floor(h/3),cols=Math.floor(w/2);
  for(var fl=0;fl<floors;fl++) for(var col=0;col<cols;col++) {
    if(rnd()>.3) continue;
    var lit=rnd()>.65, side=rnd()>.5?1:-1;
    var wn=new THREE.Mesh(new THREE.BoxGeometry(.6,.9,.1),lit?M.winLit:M.winDark);
    wn.position.set(ox+(col-cols/2)*(w/cols)*.7, baseY+fl*3+1.5+rr(-.2,.2), oz+side*(d/2+.05));
    grp.add(wn);
  }
}

var FH=3.2;

// ── Proper staircase: ramp + individual steps visible from side ──
function buildStaircase(scene,sx,sz,fy,dir) {
  // dir: 1=steps go +Z, -1=steps go -Z
  var STEPS=12, totalD=FH*0.85, totalH=FH;
  var sd=totalD/STEPS, sh=totalH/STEPS, sw=2.2;
  // Solid ramp underneath (walkable)
  var ramp=new THREE.Mesh(new THREE.BoxGeometry(sw,0.12,totalD),M.iStair);
  ramp.rotation.x= dir * -Math.atan2(totalH,totalD);
  ramp.position.set(sx, fy+totalH/2, sz+dir*totalD/2); scene.add(ramp);
  var rail=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,totalD+0.1),M.metal);
  rail.rotation.x=dir*Math.atan2(totalH,totalD);
  rail.position.set(sx+sw/2+0.06, fy+totalH*0.5+0.7, sz+dir*totalD/2); scene.add(rail);
}

// ── Wall section with door opening cut by building 3 pieces ──
function buildWallWithDoor(scene,cx,z,fy,wallW,doorW,doorH,thick) {
  var wh=FH-0.1, seg=(wallW-doorW)/2;

  var l=new THREE.Mesh(new THREE.BoxGeometry(seg,wh,thick),M.iWall);
  l.position.set(cx-doorW/2-seg/2, fy+wh/2, z); scene.add(l);
  var r=new THREE.Mesh(new THREE.BoxGeometry(seg,wh,thick),M.iWall);
  r.position.set(cx+doorW/2+seg/2, fy+wh/2, z); scene.add(r);
  var lintelH=wh-doorH;
  if(lintelH>0.05){
    var ln=new THREE.Mesh(new THREE.BoxGeometry(doorW,lintelH,thick),M.iWall);
    ln.position.set(cx, fy+doorH+lintelH/2, z); scene.add(ln);
  }
  // Interior door — hinge left, swings along -X wall
  var hingeX = cx - doorW/2;
  var ipivot = new THREE.Group();
  ipivot.position.set(hingeX, fy, z);
  scene.add(ipivot);
  var ipanel = new THREE.Mesh(
    new THREE.BoxGeometry(doorW-0.04, doorH-0.04, 0.05),
    new THREE.MeshLambertMaterial({color:0x0e0e16})
  );
  ipanel.position.set(doorW/2, doorH/2, 0);
  ipivot.add(ipanel);
  var ih = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.26,0.04), M.metalDark);
  ih.position.set(doorW-0.16, doorH*0.44, 0.05);
  ipivot.add(ih);
  doors.push({
    pivot: ipivot, open:false, targetAngle:0, currentAngle:0,
    hx: hingeX, hz: z, openAngle: Math.PI*0.8
  });

}

function buildInterior(scene,cx,cz,bw,bd) {
  var floors=Math.min(Math.max(1,ri(1,2)),2);
  var iw=bw-0.5, id=bd-0.5, totalH=FH*floors;
  var DW=1.4, DH=2.3; // doorway dimensions

  // Explicit interior walls — DoubleSide so visible from both inside and outside
  // We build them per-floor so door openings work per-floor
  var wallMat = new THREE.MeshLambertMaterial({color:0x2e2e3c, side:THREE.DoubleSide});
  var wt = 0.15; // wall thickness

  for(var f=0;f<floors;f++) {
    var fy=f*FH, surf=f===0?'tile':'concrete';

    // Floor slab
    var flr=new THREE.Mesh(new THREE.BoxGeometry(iw-0.1,0.1,id-0.1),f===0?M.iTile:M.iFloor);
    flr.position.set(cx,fy+0.05,cz); scene.add(flr);

    // Ceiling
    var ceil=new THREE.Mesh(new THREE.BoxGeometry(iw,0.1,id),M.iCeil);
    ceil.position.set(cx,fy+FH-0.05,cz); scene.add(ceil);

    // Explicit interior wall panels for this floor
    var wh2 = FH - 0.01;
    // North wall (full, no door)
    var wN=new THREE.Mesh(new THREE.BoxGeometry(iw, wh2, wt), wallMat);
    wN.position.set(cx, fy+wh2/2, cz-id/2); scene.add(wN);
    // East wall
    var wE=new THREE.Mesh(new THREE.BoxGeometry(wt, wh2, id), wallMat);
    wE.position.set(cx+iw/2, fy+wh2/2, cz); scene.add(wE);
    // West wall
    var wW=new THREE.Mesh(new THREE.BoxGeometry(wt, wh2, id), wallMat);
    wW.position.set(cx-iw/2, fy+wh2/2, cz); scene.add(wW);
    // South wall built below in entry doorway section (only floor 0), others get full south
    if(f > 0) {
      var wS=new THREE.Mesh(new THREE.BoxGeometry(iw, wh2, wt), wallMat);
      wS.position.set(cx, fy+wh2/2, cz+id/2); scene.add(wS);
    }

    // Fluorescent light bar(s)
    var dead=rnd()>0.8;
    var bar=new THREE.Mesh(new THREE.BoxGeometry(Math.min(iw*0.45,3.5),0.06,0.26),dead?M.iLightOff:M.iLight);
    bar.position.set(cx,fy+FH-0.1,cz); scene.add(bar);
    if(!dead){var pl=new THREE.PointLight(0x4455aa,4.5,FH*2.2);pl.position.set(cx,fy+FH-0.2,cz);scene.add(pl);}
    if(iw>7){
      (function(){
        var dead2=rnd()>0.72;
        var bar2=new THREE.Mesh(new THREE.BoxGeometry(Math.min(iw*0.4,3),0.06,0.26),dead2?M.iLightOff:M.iLight);
        bar2.position.set(cx,fy+FH-0.1,cz+id*0.28); scene.add(bar2);
        if(!dead2){var pl2=new THREE.PointLight(0x4455aa,3.0,FH*1.8);pl2.position.set(cx,fy+FH-0.2,cz+id*0.28);scene.add(pl2);}
      })();
    }

    // Interior divider with proper door opening
    if(id>10) {
      buildWallWithDoor(scene,cx,cz+id/4,fy,iw-0.2,DW,DH,0.18);
      addZone(cx,cz+id/8,  iw/2-0.35, id/8,   fy,fy+FH,surf);
      addZone(cx,cz-id/8,  iw/2-0.35, id*3/8, fy,fy+FH,surf);
    } else {
      addZone(cx,cz, iw/2-0.35, id/2-0.35, fy,fy+FH,surf);
    }

    // Scatter props on this floor
    scatterInteriorProps(scene,cx,cz,iw,id,fy);
  }

  // Staircase between floors
  if(floors>1) {
    var sx=cx, sz=cz-id/2+FH*0.85+0.3;
    for(var f2=0;f2<floors-1;f2++){
      buildStaircase(scene,sx,sz,f2*FH,1);
    }
  }

  // Entry doorway — south face of building
  // Build a proper opening: left wall, right wall, lintel
  var wallThick=0.15;
  var halfW=iw/2;
  var dSeg=(halfW-DW/2);
  if(dSeg>0.1){
    // left of door
    var dl=new THREE.Mesh(new THREE.BoxGeometry(dSeg,FH*0.9,wallThick),M.iWall);
    dl.position.set(cx-DW/2-dSeg/2, FH*0.45, cz+id/2+wallThick/2); scene.add(dl);
    // right of door
    var dr=new THREE.Mesh(new THREE.BoxGeometry(dSeg,FH*0.9,wallThick),M.iWall);
    dr.position.set(cx+DW/2+dSeg/2, FH*0.45, cz+id/2+wallThick/2); scene.add(dr);
    // lintel
    var lh2=FH*0.9-DH;
    if(lh2>0.05){var dln=new THREE.Mesh(new THREE.BoxGeometry(DW,lh2,wallThick),M.iWall);dln.position.set(cx,DH+lh2/2,cz+id/2+wallThick/2);scene.add(dln);}

  }
  // Small step up into building
  var step=new THREE.Mesh(new THREE.BoxGeometry(DW+0.2,0.12,0.35),M.iStair);
  step.position.set(cx,0.06,cz+id/2+wallThick+0.15); scene.add(step);

  // ── Door: pivot group hinged at left edge, swings inward (+Z = into building) ──
  var doorZ = cz+id/2+wallThick/2;  // door sits in opening
  var hingeX = cx - DW/2;           // hinge on left side

  var pivot = new THREE.Group();
  pivot.position.set(hingeX, 0, doorZ);
  scene.add(pivot);

  // Door panel (origin at hinge edge — extends +X)
  var doorPanel = new THREE.Mesh(
    new THREE.BoxGeometry(DW-0.04, DH-0.04, 0.06),
    new THREE.MeshLambertMaterial({color:0x0e0e16})
  );
  doorPanel.position.set(DW/2, DH/2, 0);
  pivot.add(doorPanel);

  // Handle bar on panel (offset from center toward free edge)
  var dh = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.3,0.05), M.metalDark);
  dh.position.set(DW-0.18, DH*0.44, 0.06);
  pivot.add(dh);
  // Handle backing plate
  var dhp = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.04,0.12), M.metalDark);
  dhp.position.set(DW-0.18, DH*0.44, 0.03);
  pivot.add(dhp);

  // Register door
  doors.push({
    pivot: pivot,
    open: false,
    targetAngle: 0,
    currentAngle: 0,
    // world position of hinge for proximity check
    hx: hingeX,
    hz: doorZ,
    // open swings inward (negative Z in world = into building = positive rotation)
    openAngle: -Math.PI * 0.82
  });
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function startGame() {
  var canvas = document.getElementById('gc');
  var wrap   = document.getElementById('wrap');

  // Size canvas to window
  var W = canvas.clientWidth  || window.innerWidth;
  var H = canvas.clientHeight || window.innerHeight;
  // internal low-res
  var RW = 320, RH = 240;

  var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:false});
  renderer.setSize(RW, RH, false); // false = don't update style
  renderer.setPixelRatio(1);
  renderer.shadowMap.enabled = false;
  renderer.setClearColor(0x0d0d1a);

  var scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x12121f, 12, 75);
  scene.background = new THREE.Color(0x12121f);

  var camera = new THREE.PerspectiveCamera(75, RW/RH, 0.1, 100);
  camera.position.set(0,1.7,0);
  camera.rotation.order = 'YXZ';

  // Lighting — HemisphereLight covers the whole world in one draw, no per-light passes
  // Ambient — brighter so buildings are actually visible
  scene.add(new THREE.HemisphereLight(0x4466cc, 0x222233, 2.8));
  var sun=new THREE.DirectionalLight(0x6677bb, 1.6);
  sun.position.set(2,5,2); scene.add(sun);
  var sun2=new THREE.DirectionalLight(0x334488, 0.9);
  sun2.position.set(-1,3,-2); scene.add(sun2);

  // Materials
  M = {
    ground:    new THREE.MeshLambertMaterial({color:0x22222e}),
    brut1:     new THREE.MeshLambertMaterial({color:0x3a3a50}),
    brut2:     new THREE.MeshLambertMaterial({color:0x303040}),
    brut3:     new THREE.MeshLambertMaterial({color:0x3c3c52}),
    winLit:    new THREE.MeshLambertMaterial({color:0x3a3a52,emissive:0x141428}),
    winDark:   new THREE.MeshLambertMaterial({color:0x090912}),
    walkway:   new THREE.MeshLambertMaterial({color:0x242434}),
    iShell:    new THREE.MeshLambertMaterial({color:0x18181f,side:THREE.BackSide}),
    iFloor:    new THREE.MeshLambertMaterial({color:0x28283a}),
    iTile:     new THREE.MeshLambertMaterial({color:0x2c2c3c}),
    iCeil:     new THREE.MeshLambertMaterial({color:0x202030}),
    iWall:     new THREE.MeshLambertMaterial({color:0x32323e}),
    iStair:    new THREE.MeshLambertMaterial({color:0x141422}),
    iLight:    new THREE.MeshLambertMaterial({color:0x8888bb,emissive:0x4444aa}),
    iLightOff: new THREE.MeshLambertMaterial({color:0x1a1a22}),
    iDoor:     new THREE.MeshLambertMaterial({color:0x0c0c18}),
    metal:     new THREE.MeshLambertMaterial({color:0x2a2a38}),
    metalDark: new THREE.MeshLambertMaterial({color:0x202030}),
    rust:      new THREE.MeshLambertMaterial({color:0x2a1a12}),
    wood:      new THREE.MeshLambertMaterial({color:0x2e2010}),
    woodDark:  new THREE.MeshLambertMaterial({color:0x120e06}),
    poster:    new THREE.MeshLambertMaterial({color:0x1a1828}),
    posterFade:new THREE.MeshLambertMaterial({color:0x141218}),
    sign:      new THREE.MeshLambertMaterial({color:0x0e1218,emissive:0x060810}),
    lamp:      new THREE.MeshLambertMaterial({color:0x665533,emissive:0x3a2810}),
    lampOff:   new THREE.MeshLambertMaterial({color:0x1a1814}),
    pipe:      new THREE.MeshLambertMaterial({color:0x181820}),
    chair:     new THREE.MeshLambertMaterial({color:0x141018}),
    desk:      new THREE.MeshLambertMaterial({color:0x16120a}),
    cable:     new THREE.MeshLambertMaterial({color:0x0e0e14}),
  };

  buildWorld(scene);

  // ── SAVE/LOAD BRIDGE ──
  getGameCamera = function(load) {
    if (load) {
      camera.position.set(load.x, load.y, load.z);
      yaw = load.yaw || 0; pitch = load.pitch || 0;
      velY = 0; onGround = true;
    } else {
      return { x:camera.position.x, y:camera.position.y, z:camera.position.z, yaw:yaw, pitch:pitch };
    }
  };
  try {
    var autoLoad = localStorage.getItem('liminal_save');
    if (autoLoad) { var ald=JSON.parse(autoLoad); camera.position.set(ald.x,ald.y,ald.z); yaw=ald.yaw||0; pitch=ald.pitch||0; }
  } catch(e){}
  applyOpts(); updateSavedDisplay();

  // ── INPUT ──
  getGameCamera = function(load) {
    if (load) {
      // load mode
      camera.position.set(load.x, load.y, load.z);
      yaw   = load.yaw   || 0;
      pitch = load.pitch || 0;
      velY  = 0; onGround = true;
    } else {
      // save mode — return state
      return { x: camera.position.x, y: camera.position.y, z: camera.position.z, yaw: yaw, pitch: pitch };
    }
  };

  // Auto-load on start if save exists
  try {
    var autoLoad = localStorage.getItem('liminal_save');
    if (autoLoad) {
      var ald = JSON.parse(autoLoad);
      camera.position.set(ald.x, ald.y, ald.z);
      yaw   = ald.yaw   || 0;
      pitch = ald.pitch || 0;
    }
  } catch(e){}

  applyOpts();
  updateSavedDisplay();
  var keys = {};
  var yaw=0, pitch=0;
  var locked = false;

  window.addEventListener('keydown', function(e) {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>-1) e.preventDefault();
  });
  window.addEventListener('keyup', function(e) { keys[e.code] = false; });

  // Pointer lock
  canvas.addEventListener('click', function() {
    initAudio();
    canvas.requestPointerLock();
  });
  document.addEventListener('pointerlockchange', function() {
    locked = document.pointerLockElement === canvas;
  });
  document.addEventListener('mousemove', function(e) {
    if (!locked) return;
    yaw   -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1.0, Math.min(1.0, pitch));
  });

  // Touch look (right side of screen)
  var touchLook = null;
  canvas.addEventListener('touchstart', function(e) {
    initAudio();
    for (var i=0;i<e.changedTouches.length;i++) {
      var t=e.changedTouches[i];
      if (t.clientX > window.innerWidth*0.4) { touchLook={id:t.identifier,x:t.clientX,y:t.clientY}; }
    }
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchmove', function(e) {
    if (!touchLook) return;
    for (var i=0;i<e.changedTouches.length;i++) {
      var t=e.changedTouches[i];
      if (t.identifier===touchLook.id) {
        yaw   -= (t.clientX-touchLook.x)*0.004;
        pitch -= (t.clientY-touchLook.y)*0.004;
        pitch = Math.max(-1.0,Math.min(1.0,pitch));
        touchLook.x=t.clientX; touchLook.y=t.clientY;
      }
    }
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend', function(e) {
    if (!touchLook) return;
    for (var i=0;i<e.changedTouches.length;i++) {
      if (e.changedTouches[i].identifier===touchLook.id) touchLook=null;
    }
  });

  // D-pad buttons
  document.querySelectorAll('.dkey').forEach(function(btn) {
    var code = btn.dataset.key;
    btn.addEventListener('touchstart', function(e) { e.preventDefault(); keys[code]=true; initAudio(); },{passive:false});
    btn.addEventListener('touchend',   function(e) { e.preventDefault(); keys[code]=false; },{passive:false});
    btn.addEventListener('mousedown',  function()  { keys[code]=true; });
    btn.addEventListener('mouseup',    function()  { keys[code]=false; });
  });

  // ── PHYSICS ──
  var velY=0, onGround=true, bobPhase=0;
  var GRAV=-20, JVEL=6.2, EYE=1.7, RAD=0.38;

  function resolveWalls(pos) {
    for(var i=0;i<solids.length;i++){
      var b=solids[i];
      var cx=(b.minX+b.maxX)/2, cz=(b.minZ+b.maxZ)/2;
      var hw=(b.maxX-b.minX)/2+RAD, hd=(b.maxZ-b.minZ)/2+RAD;
      var dx=pos.x-cx, dz=pos.z-cz;
      if(Math.abs(dx)<hw&&Math.abs(dz)<hd){
        var ox=hw-Math.abs(dx), oz=hd-Math.abs(dz);
        if(ox<oz) pos.x+=dx>=0?ox:-ox; else pos.z+=dz>=0?oz:-oz;
      }
    }
  }

  // ── OVERLAY ──
  var ov = document.getElementById('ov');
  var octx = ov.getContext('2d');

  // Static overlay canvas — scanlines + vignette drawn once
  var ovStatic = document.createElement('canvas');
  ovStatic.width=320; ovStatic.height=240;
  var osCtx = ovStatic.getContext('2d');
  function rebuildStaticOverlay() {
    var w=ovStatic.width, h=ovStatic.height;
    osCtx.clearRect(0,0,w,h);
    if(opts.scanlines){ osCtx.fillStyle='rgba(0,0,0,0.13)'; for(var y=0;y<h;y+=2) osCtx.fillRect(0,y,w,1); }
    if(opts.vignette){ var vig=osCtx.createRadialGradient(w/2,h/2,h*.14,w/2,h/2,h*.86); vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,18,.7)'); osCtx.fillStyle=vig; osCtx.fillRect(0,0,w,h); }
  }
  rebuildStaticOverlay();
  // Rebuild when opts change
  var _prevScan=opts.scanlines, _prevVig=opts.vignette;

  function drawOverlayFrame() {
    var w=ov.width, h=ov.height;
    // Rebuild static layer only if opts changed
    if(opts.scanlines!==_prevScan||opts.vignette!==_prevVig){ rebuildStaticOverlay(); _prevScan=opts.scanlines; _prevVig=opts.vignette; }
    octx.clearRect(0,0,w,h);
    octx.drawImage(ovStatic,0,0);
    if(opts.grain){ for(var i=0;i<60;i++){octx.fillStyle='rgba(255,255,255,'+(Math.random()*.05)+')';octx.fillRect(Math.random()*w,Math.random()*h,1,1);} }
  }

  var hud  = document.getElementById('hud');
  var info = document.getElementById('info');
  var clock = new THREE.Clock();
  var jumped = false;
  var _eWasDown = false;

  // ── FRAME LOOP ──
  function frame() {
    requestAnimationFrame(frame);
    var dt = Math.min(clock.getDelta(), 0.033);
    if(optOpen) { drawOverlayFrame(); return; } // pause physics when menu open

    var moving   = keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']||keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight'];
    var sprinting = moving && (keys['ShiftLeft']||keys['ShiftRight']);
    var speed    = sprinting ? 13 : 7.5;

    // horizontal movement
    var dir = new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])    dir.z-=1;
    if(keys['KeyS']||keys['ArrowDown'])  dir.z+=1;
    if(keys['KeyA']||keys['ArrowLeft'])  dir.x-=1;
    if(keys['KeyD']||keys['ArrowRight']) dir.x+=1;
    dir.normalize().multiplyScalar(speed*dt);
    dir.applyEuler(new THREE.Euler(0,yaw,0));

    // zone
    var zone = getZone(camera.position.x, camera.position.z);
    var floorY = zone ? zone.floorY+EYE : EYE;
    var ceilY  = zone ? zone.ceilY-.4   : 9999;
    var surf   = zone ? zone.surface : 'concrete';

    // gravity
    if(!onGround) velY += GRAV*dt; else velY=Math.max(velY,0);
    // jump
    if(keys['Space']&&onGround&&!jumped) { velY=JVEL; onGround=false; jumped=true; playJump(); }
    if(!keys['Space']) jumped=false;

    // integrate
    var nx=camera.position.x+dir.x;
    var ny=camera.position.y+velY*dt;
    var nz=camera.position.z+dir.z;

    // floor
    if(ny<=floorY){ if(!onGround&&velY<-1) playLand(velY); ny=floorY; velY=0; onGround=true; }
    else onGround=false;
    // ceiling
    if(ny>ceilY){ ny=ceilY; velY=Math.min(velY,0); }

    // wall collision
    var tmp = new THREE.Vector3(nx,ny,nz);
    resolveWalls(tmp);
    nx=tmp.x; nz=tmp.z;

    // PS1 snap
    camera.position.x = Math.round(nx/0.05)*0.05;
    camera.position.z = Math.round(nz/0.05)*0.05;
    camera.position.y = ny;

    // head bob
    if(moving && onGround) {
      var bs=sprinting?11:6.5, ba=sprinting?.065:.022;
      bobPhase+=dt*bs;
      camera.position.y+=Math.sin(bobPhase)*ba;
      if (opts.footsteps) playFootstep(surf, sprinting);
    } else bobPhase=0;

    doBreath(dt,sprinting,onGround);
    setInsideAudio(!!zone);

    // apply look
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // ── DOOR INTERACTION ──
    var DOOR_REACH = 2.2;
    var nearDoor = null, nearDist = DOOR_REACH;
    for(var di=0; di<doors.length; di++){
      var dd=doors[di];
      var ddx=camera.position.x-dd.hx, ddz=camera.position.z-dd.hz;
      var dist=Math.sqrt(ddx*ddx+ddz*ddz);
      if(dist<nearDist){ nearDist=dist; nearDoor=dd; }
      // Animate
      var angleDiff = dd.targetAngle - dd.currentAngle;
      if(Math.abs(angleDiff)>0.002){
        dd.currentAngle += angleDiff * Math.min(dt*8, 1);
        dd.pivot.rotation.y = dd.currentAngle;
      }
    }
    if(nearDoor && (keys['KeyE'] && !_eWasDown)){
      nearDoor.open = !nearDoor.open;
      nearDoor.targetAngle = nearDoor.open ? nearDoor.openAngle : 0;
    }
    _eWasDown = !!keys['KeyE'];

    // HUD
    hud.textContent = nearDoor ? '[E] ' + (nearDoor.open?'close':'open') : (zone ? 'interior' : 'you are here');

    renderer.render(scene, camera);
    drawOverlayFrame();
  }

  frame();
  document.getElementById('hud').textContent = 'you are here';
}
</script>
